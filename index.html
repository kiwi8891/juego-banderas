const CONTS={"Europa":["España","Francia","Italia","Alemania","Reino Unido","Portugal","Países Bajos","Suecia","Grecia"],"América":["Estados Unidos","Brasil","Argentina","México","Colombia","Perú","Canadá"],"Asia":["Japón","China","India","Rusia","Turquía","Arabia Saudí","Indonesia"],"África":["Egipto","Sudáfrica","Marruecos","Nigeria","Kenya"],"Oceanía":["Australia","Nueva Zelanda"]};
const DEFS=[{k:"flag",l:"Bandera"},{k:"monument",l:"Monumento"},{k:"food",l:"Comida típica"},{k:"capital",l:"Capital"}];
const WIKI=t=>`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(t)}&prop=pageimages&pithumbsize=600&format=json&origin=*`;
const ISO={España:"ES",Francia:"FR",Italia:"IT",Alemania:"DE","Reino Unido":"GB","Estados Unidos":"US",Brasil:"BR",Argentina:"AR","México":"MX","Japón":"JP",China:"CN",India:"IN",Rusia:"RU",Australia:"AU","Canadá":"CA",Egipto:"EG","Sudáfrica":"ZA",Marruecos:"MA","Turquía":"TR",Grecia:"GR",Portugal:"PT","Países Bajos":"NL",Suecia:"SE",Colombia:"CO",Nigeria:"NG",Kenya:"KE","Arabia Saudí":"SA",Indonesia:"ID","Perú":"PE","Nueva Zelanda":"NZ"};
const sh=a=>[...a].sort(()=>Math.random()-.5);

function faces(pct){
  if(pct>=90)return{f:"🤩🤩🤩🤩🤩",m:"¡Increíble, Nil!"};
  if(pct>=70)return{f:"😄😄😄😄",m:"¡Muy bien!"};
  if(pct>=50)return{f:"🙂🙂🙂",m:"¡Bien!"};
  if(pct>=30)return{f:"😐😐",m:"Puedes mejorar"};
  return{f:"😢",m:"¡A practicar!"};
}
function starsFor(ci){return ci===0?3:ci===1?2:1;}
function starsHTML(n){return "⭐".repeat(n)+"<span style=opacity:.3>"+("⭐".repeat(3-n))+"</span>";}

let S={pool:[],cur:null,order:[],ci:0,score:0,total:0,cache:{},stars:0,streak:0};
const app=document.getElementById("app");

function home(){
  S={pool:[],cur:null,order:[],ci:0,score:0,total:0,cache:{},stars:0,streak:0};
  const co=Object.keys(CONTS).map(c=>`<option>${c}</option>`).join("");
  const po=[...C].sort((a,b)=>a.n.localeCompare(b.n,"es")).map(c=>`<option value="${c.n}">${c.flag} ${c.n}</option>`).join("");
  app.innerHTML=`<div class="hw">
<div class="eyebrow">Juego de geografía</div>
<div class="ht">¿Qué<br>país es?</div>
<div class="hs">Para Nil — adivina el país con las pistas</div>
<button class="btn bm" onclick="go(&apos;r&apos;,null)">— País aleatorio</button>
<div class="div">o elige</div>
<div class="sl">Por continente</div>
<div class="sr"><select id="sc">${co}</select><button class="btn bx" onclick="go(&apos;c&apos;,document.getElementById(&quot;sc&quot;).value)">Jugar</button></div>
<div class="sl">País concreto</div>
<div class="sr"><select id="sp">${po}</select><button class="btn bx" onclick="go(&apos;p&apos;,document.getElementById(&quot;sp&quot;).value)">Jugar</button></div>
</div>`;
}

function go(mode,val){
  const pool=mode==="r"?sh(C):mode==="c"?sh(C.filter(c=>CONTS[val]?.includes(c.n))):C.filter(c=>c.n===val);
  S={...S,pool,score:0,total:0,stars:0,streak:0};next();
}

async function next(){
  if(!S.pool.length){end();return;}
  S.cur=S.pool.shift();
  S.order=sh(DEFS);S.ci=0;S.cache={};
  await render();
}

async function render(){
  const ci=S.ci,tot=S.order.length;
  let html="";
  for(let i=0;i<=ci;i++) html+=await clue(S.order[i]);
  const dots=S.order.map((_,i)=>`<div class="dot ${i<ci?"was":i===ci?"on":""}"></div>`).join("");
  app.innerHTML=`<div class="gw">
<div class="topbar">
<div class="si"><div class="sn">${S.score}</div><div class="sk">Aciertos</div></div>
<div class="sdv"></div>
<div class="si"><div class="sn">${S.streak>1?S.streak+"🔥":S.streak}</div><div class="sk">Racha</div></div>
<div class="sdv"></div>
<div class="si"><div class="sn">${S.pool.length}</div><div class="sk">Restantes</div></div>
</div>
<div class="dots">${dots}</div>
${html}
${ci<tot-1?`<button class="btn bh" onclick="more()">+ Siguiente pista</button>`:""}
<div class="acts">
<button class="btn bc" onclick="ok()">✓ ¡Lo ha adivinado!</button>
<button class="btn bsk" onclick="skip()">Saltar · No sabe</button>
<button class="btn bend" onclick="end()">✕ Terminar partida</button>
</div>
</div>`;
}

async function clue(def){
  const c=S.cur,{k,l}=def;
  let b="";
  if(k==="flag") b=`<span class="fe">${c.flag}</span>`;
  else if(k==="capital") b=`<div class="cpt">${c.cap}</div>`;
  else{
    const terms=k==="monument"?c.ms:c.fs;
    const names=k==="monument"?c.mns:c.fns;
    let u=null,name=names[0];
    for(let i=0;i<terms.length;i++){
      u=await getImg(terms[i]);
      if(u){name=names[i];break;}
    }
    const wid="iw"+Date.now();
    b="<div class=ci-wrap id="+wid+"></div><div class=iname>"+name+"</div>";
    if(u){
      const imgUrl=u;
      setTimeout(function(){
        const wrap=document.getElementById(wid);
        if(!wrap)return;
        const img=document.createElement("img");
        img.className="ci";
        img.src=imgUrl;
        img.onerror=function(){wrap.style.display="none";};
        wrap.appendChild(img);
      },0);
    }
  }
  return`<div class="cc"><div class="ch"><span class="ct">${l}</span></div><div class="cb">${b}</div></div>`;
}

async function getImg(term){
  if(term in S.cache) return S.cache[term];
  try{
    const r=await fetch(WIKI(term));
    const d=await r.json();
    const p=d.query.pages;
    const u=p[Object.keys(p)[0]]?.thumbnail?.source||null;
    S.cache[term]=u;
    return u;
  }catch{S.cache[term]=null;return null;}
}

async function more(){if(S.ci<S.order.length-1){S.ci++;await render();}}
function ok(){S.score++;S.total++;S.streak++;S.stars+=starsFor(S.ci);result(true);}
function skip(){S.total++;S.streak=0;result(false);}

function result(win){
  const c=S.cur;
  const iso=ISO[c.n]||"";
  const earned=win?starsFor(S.ci):0;
  const starsDiv=win?"<div class=stars-earned>"+starsHTML(earned)+"</div>":"";
  app.innerHTML="<div class=rw>"
    +"<div class=ri>"+(win?"🎉":"🌍")+"</div>"
    +"<div class=rf>"+c.flag+"</div>"
    +"<div class=rn>"+c.n+"</div>"
    +"<div class=rc>Capital · "+c.cap+"</div>"
    +starsDiv
    +"<div><span class=\"rtag "+(win?"tok":"tno")+"\">"+(win?"¡Acertado!":"Era "+c.n)+"</span></div>"
    +"<div class=map-wrap><div id=mapbox>Cargando mapa...</div></div>"
    +"<div class=ra>"
    +"<button class=\"btn bm\" onclick=\"next()\">Siguiente país →</button>"
    +"<button class=\"btn bsk\" style=\"margin-top:4px\" onclick=\"end()\">Terminar partida</button>"
    +"<button class=\"btn bsk\" onclick=\"home()\">Inicio</button>"
    +"</div></div>";
  loadMap(iso);
}

function loadMap(iso){
  const box=document.getElementById("mapbox");
  if(!box||!iso)return;
  const url="https://raw.githubusercontent.com/djaiss/mapsicon/master/all/"+iso.toLowerCase()+"/vector.svg";
  const img=document.createElement("img");
  img.src=url;
  img.style.cssText="width:100%;max-height:180px;object-fit:contain;filter:invert(1) sepia(1) saturate(3) hue-rotate(5deg);border-radius:4px";
  img.onerror=function(){box.innerHTML="";};
  box.innerHTML="";
  box.appendChild(img);
}

function end(){
  if(S.total===0){home();return;}
  const pct=Math.round(S.score/S.total*100);
  const{f,m}=faces(pct);
  const maxStars=S.total*3;
  app.innerHTML=`<div class="ew">
<div class="eyebrow">Fin de la partida</div>
<div class="efaces">${f}</div>
<div class="es">${S.score}/${S.total}</div>
<div class="epct">${pct}% de aciertos</div>
<div class="estars">⭐ ${S.stars} de ${maxStars} estrellas</div>
<div class="emsg">${m}</div>
<button class="btn bm" onclick="home()">Jugar de nuevo</button>
</div>`;
}

home();
</script>
</body>
</html>
